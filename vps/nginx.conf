# /etc/nginx/nginx.conf
# Spheris Stream Server — RTMP ingest + HLS serving + auth proxy

user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
}

# RTMP ingest from the Mac Mini
rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        allow publish all;

        application live {
            live on;
            record off;

            # Convert RTMP to HLS
            hls on;
            hls_path /var/www/stream/hls;
            hls_fragment 2s;
            hls_playlist_length 12s;
            hls_cleanup on;

            # Notify auth app when stream starts/stops
            on_publish http://127.0.0.1:5000/api/internal/stream-start;
            on_publish_done http://127.0.0.1:5000/api/internal/stream-stop;
        }
    }
}

http {
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    gzip on;

    server {
        listen 80;
        server_name stream.sparkpoint.studio;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name stream.sparkpoint.studio;

        ssl_certificate /etc/letsencrypt/live/stream.sparkpoint.studio/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/stream.sparkpoint.studio/privkey.pem;

        # HLS segments — served directly by nginx for performance
        # Auth checked via subrequest to the Flask app
        location /hls/ {
            # Check auth via subrequest
            auth_request /auth-check;

            alias /var/www/stream/hls/;
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            add_header Cache-Control "no-cache";
            add_header Access-Control-Allow-Origin *;
        }

        # Internal auth check endpoint
        location = /auth-check {
            internal;
            proxy_pass http://127.0.0.1:5000/api/internal/auth-check;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
        }

        # Everything else goes to the Flask app
        location / {
            proxy_pass http://127.0.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
