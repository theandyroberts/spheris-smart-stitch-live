# /etc/nginx/nginx.conf
# Spheris Stream Server — RTMP ingest only
# Site configs (including stream.sparkpoint.studio) are in /etc/nginx/sites-enabled/

user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
}

# RTMP ingest from the Mac Mini
rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        allow publish all;

        application live {
            live on;
            record off;
            wait_video on;

            hls on;
            hls_type live;
            hls_path /var/www/stream/hls;
            hls_fragment 2s;
            hls_playlist_length 12s;
            hls_cleanup on;

            on_publish http://127.0.0.1:5000/api/internal/stream-start;
            on_publish_done http://127.0.0.1:5000/api/internal/stream-stop;
        }
    }
}

http {
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    gzip on;

    include /etc/nginx/sites-enabled/*;
}
